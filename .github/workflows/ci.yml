name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Run sample command
        run: maintainer-radar from-json examples/sample-prs.json
      - name: Check browser demo
        run: |
          node --check docs/assets/demo.js
          node tests/demo_smoke.js

  action-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run local action
        id: radar
        uses: ./
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          repository: ${{ github.repository }}
          format: markdown
          output: maintainer-radar.md
          limit: "5"
          action: review-now
          min-score: "80"
          group-by: action
          review-plan-minutes: "30"
          hydrate: "false"
      - name: Check action output
        env:
          REPORT_PATH: ${{ steps.radar.outputs.report-path }}
          TOTAL: ${{ steps.radar.outputs.total }}
          AVERAGE_SCORE: ${{ steps.radar.outputs.average-score }}
          QUEUE_HEADLINE: ${{ steps.radar.outputs.queue-headline }}
          ATTENTION_LEVEL: ${{ steps.radar.outputs.attention-level }}
          ATTENTION_REASON: ${{ steps.radar.outputs.attention-reason }}
          PLAN_BUDGET_MINUTES: ${{ steps.radar.outputs.plan-budget-minutes }}
          PLANNED_PRS: ${{ steps.radar.outputs.planned-prs }}
          PLANNED_MINUTES: ${{ steps.radar.outputs.planned-minutes }}
        run: |
          test -s "$REPORT_PATH"
          grep -q "Maintainer Radar" "$REPORT_PATH"
          grep -q "Review Plan" "$REPORT_PATH"
          test -n "$TOTAL"
          test -n "$AVERAGE_SCORE"
          test -n "$QUEUE_HEADLINE"
          test -n "$ATTENTION_LEVEL"
          test -n "$ATTENTION_REASON"
          test -n "$PLAN_BUDGET_MINUTES"
          test -n "$PLANNED_PRS"
          test -n "$PLANNED_MINUTES"

          cat > summary.json <<'JSON'
          ${{ steps.radar.outputs.summary-json }}
          JSON
          python - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("summary.json").read_text())
          assert "queue_headline" in summary
          assert "attention_level" in summary
          assert "attention_reason" in summary
          PY
