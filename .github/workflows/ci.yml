name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Run sample command
        run: maintainer-radar from-json examples/sample-prs.json
      - name: Check browser demo
        run: |
          node --check docs/assets/demo.js
          node tests/demo_smoke.js

  action-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run local action
        id: radar
        uses: ./
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          repository: ${{ github.repository }}
          format: markdown
          output: maintainer-radar.md
          limit: "5"
          action: review-now
          min-score: "80"
          group-by: action
          review-plan-minutes: "30"
          hydrate: "false"
      - name: Check action output
        run: |
          test -s "${{ steps.radar.outputs.report-path }}"
          grep -q "Maintainer Radar" "${{ steps.radar.outputs.report-path }}"
          grep -q "Review Plan" "${{ steps.radar.outputs.report-path }}"
          test -n "${{ steps.radar.outputs.total }}"
          test -n "${{ steps.radar.outputs.average-score }}"
          test -n "${{ steps.radar.outputs.summary-json }}"
