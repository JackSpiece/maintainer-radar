name: Maintainer Radar
description: Build read-only pull request triage reports for maintainers.
branding:
  icon: activity
  color: blue

inputs:
  repository:
    description: Repository to scan in owner/name form. Defaults to the workflow repository.
    required: false
    default: ""
  format:
    description: Report format.
    required: false
    default: markdown
  output:
    description: Output file path for the report artifact. Defaults to maintainer-radar with the selected format extension.
    required: false
    default: ""
  limit:
    description: Maximum pull requests to scan.
    required: false
    default: "50"
  label:
    description: Only include pull requests with this label.
    required: false
    default: ""
  author:
    description: Only include pull requests by this author.
    required: false
    default: ""
  stale-days:
    description: Only include pull requests quiet for at least N days.
    required: false
    default: ""
  updated-since:
    description: Only include pull requests updated on or after this ISO date.
    required: false
    default: ""
  action:
    description: Only include pull requests with this recommended action slug.
    required: false
    default: ""
  min-score:
    description: Only include pull requests with reviewability greater than or equal to N.
    required: false
    default: ""
  max-risk:
    description: Only include pull requests with risk less than or equal to N.
    required: false
    default: ""
  sort:
    description: Sort order for queue output.
    required: false
    default: action
  top:
    description: Only include the first N pull requests after filtering and sorting.
    required: false
    default: ""
  group-by:
    description: "Group Markdown and HTML queue reports by a field. Supported value: action."
    required: false
    default: ""
  config:
    description: Optional path to a Maintainer Radar config JSON file.
    required: false
    default: ""
  hydrate:
    description: Fetch full pull request details for deeper scoring.
    required: false
    default: "true"
  step-summary:
    description: Publish Markdown output or a compact summary to the GitHub Actions run summary.
    required: false
    default: "true"

outputs:
  report-path:
    description: Path to the generated report file.
    value: ${{ steps.build.outputs.report-path }}
  summary-json:
    description: JSON summary for the generated report.
    value: ${{ steps.build.outputs.summary-json }}
  total:
    description: Number of pull requests in the report after filters.
    value: ${{ steps.build.outputs.total }}
  review-now:
    description: Number of pull requests ready for review.
    value: ${{ steps.build.outputs.review-now }}
  author-follow-up:
    description: Number of pull requests needing author follow-up.
    value: ${{ steps.build.outputs.author-follow-up }}
  ci-blocked:
    description: Number of pull requests with failing CI.
    value: ${{ steps.build.outputs.ci-blocked }}
  ci-pending:
    description: Number of pull requests waiting for CI.
    value: ${{ steps.build.outputs.ci-pending }}
  maintainer-blocked:
    description: Number of pull requests blocked by maintainer feedback or labels.
    value: ${{ steps.build.outputs.maintainer-blocked }}
  large-or-triage:
    description: Number of pull requests that are too large or need triage.
    value: ${{ steps.build.outputs.large-or-triage }}
  stale:
    description: Number of pull requests quiet for 7 or more days.
    value: ${{ steps.build.outputs.stale }}
  average-score:
    description: Average reviewability score for the report.
    value: ${{ steps.build.outputs.average-score }}

runs:
  using: composite
  steps:
    - name: Install Maintainer Radar
      shell: bash
      run: python -m pip install "$GITHUB_ACTION_PATH"
    - name: Build report
      id: build
      shell: bash
      env:
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_LIMIT: ${{ inputs.limit }}
        INPUT_LABEL: ${{ inputs.label }}
        INPUT_AUTHOR: ${{ inputs.author }}
        INPUT_STALE_DAYS: ${{ inputs.stale-days }}
        INPUT_UPDATED_SINCE: ${{ inputs.updated-since }}
        INPUT_ACTION: ${{ inputs.action }}
        INPUT_MIN_SCORE: ${{ inputs.min-score }}
        INPUT_MAX_RISK: ${{ inputs.max-risk }}
        INPUT_SORT: ${{ inputs.sort }}
        INPUT_TOP: ${{ inputs.top }}
        INPUT_GROUP_BY: ${{ inputs.group-by }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_HYDRATE: ${{ inputs.hydrate }}
        INPUT_STEP_SUMMARY: ${{ inputs.step-summary }}
      run: |
        set -euo pipefail

        repository="${INPUT_REPOSITORY:-${GITHUB_REPOSITORY:-}}"
        if [ -z "$repository" ]; then
          echo "repository input is required when GITHUB_REPOSITORY is unavailable" >&2
          exit 2
        fi
        case "$INPUT_FORMAT" in
          markdown) default_output="maintainer-radar.md" ;;
          html) default_output="maintainer-radar.html" ;;
          json) default_output="maintainer-radar.json" ;;
          csv) default_output="maintainer-radar.csv" ;;
          *)
            echo "format must be markdown, html, json, or csv" >&2
            exit 2
            ;;
        esac
        output="${INPUT_OUTPUT:-$default_output}"
        mkdir -p "$(dirname "$output")"
        echo "report-path=$output" >> "$GITHUB_OUTPUT"

        command=(
          maintainer-radar repo "$repository"
          --limit "$INPUT_LIMIT"
          --sort "$INPUT_SORT"
          --format "$INPUT_FORMAT"
        )
        if [ "$INPUT_HYDRATE" = "true" ]; then
          command+=(--hydrate)
        fi
        if [ -n "$INPUT_TOP" ]; then
          command+=(--top "$INPUT_TOP")
        fi
        if [ -n "$INPUT_GROUP_BY" ]; then
          command+=(--group-by "$INPUT_GROUP_BY")
        fi
        if [ -n "$INPUT_CONFIG" ]; then
          command+=(--config "$INPUT_CONFIG")
        fi
        if [ -n "$INPUT_LABEL" ]; then
          command+=(--label "$INPUT_LABEL")
        fi
        if [ -n "$INPUT_AUTHOR" ]; then
          command+=(--author "$INPUT_AUTHOR")
        fi
        if [ -n "$INPUT_STALE_DAYS" ]; then
          command+=(--stale-days "$INPUT_STALE_DAYS")
        fi
        if [ -n "$INPUT_UPDATED_SINCE" ]; then
          command+=(--updated-since "$INPUT_UPDATED_SINCE")
        fi
        if [ -n "$INPUT_ACTION" ]; then
          command+=(--action "$INPUT_ACTION")
        fi
        if [ -n "$INPUT_MIN_SCORE" ]; then
          command+=(--min-score "$INPUT_MIN_SCORE")
        fi
        if [ -n "$INPUT_MAX_RISK" ]; then
          command+=(--max-risk "$INPUT_MAX_RISK")
        fi

        if [ "$INPUT_STEP_SUMMARY" = "true" ] && [ "$INPUT_FORMAT" = "markdown" ]; then
          "${command[@]}" | tee "$output" >> "$GITHUB_STEP_SUMMARY"
        else
          "${command[@]}" > "$output"
        fi

        summary_command=(
          maintainer-radar repo "$repository"
          --limit "$INPUT_LIMIT"
          --sort "$INPUT_SORT"
          --summary-only
        )
        if [ "$INPUT_HYDRATE" = "true" ]; then
          summary_command+=(--hydrate)
        fi
        if [ -n "$INPUT_TOP" ]; then
          summary_command+=(--top "$INPUT_TOP")
        fi
        if [ -n "$INPUT_CONFIG" ]; then
          summary_command+=(--config "$INPUT_CONFIG")
        fi
        if [ -n "$INPUT_LABEL" ]; then
          summary_command+=(--label "$INPUT_LABEL")
        fi
        if [ -n "$INPUT_AUTHOR" ]; then
          summary_command+=(--author "$INPUT_AUTHOR")
        fi
        if [ -n "$INPUT_STALE_DAYS" ]; then
          summary_command+=(--stale-days "$INPUT_STALE_DAYS")
        fi
        if [ -n "$INPUT_UPDATED_SINCE" ]; then
          summary_command+=(--updated-since "$INPUT_UPDATED_SINCE")
        fi
        if [ -n "$INPUT_ACTION" ]; then
          summary_command+=(--action "$INPUT_ACTION")
        fi
        if [ -n "$INPUT_MIN_SCORE" ]; then
          summary_command+=(--min-score "$INPUT_MIN_SCORE")
        fi
        if [ -n "$INPUT_MAX_RISK" ]; then
          summary_command+=(--max-risk "$INPUT_MAX_RISK")
        fi

        summary_json="$("${summary_command[@]}" --format json)"
        {
          echo "summary-json<<MAINTAINER_RADAR_SUMMARY"
          printf '%s\n' "$summary_json"
          echo "MAINTAINER_RADAR_SUMMARY"
        } >> "$GITHUB_OUTPUT"

        SUMMARY_JSON="$summary_json" python - <<'PY' >> "$GITHUB_OUTPUT"
        import json
        import os

        summary = json.loads(os.environ["SUMMARY_JSON"])
        outputs = {
            "total": "total",
            "review-now": "review_now",
            "author-follow-up": "author_follow_up",
            "ci-blocked": "ci_blocked",
            "ci-pending": "ci_pending",
            "maintainer-blocked": "maintainer_blocked",
            "large-or-triage": "large_or_triage",
            "stale": "stale",
            "average-score": "average_score",
        }
        for output_name, summary_key in outputs.items():
            print(f"{output_name}={int(summary.get(summary_key) or 0)}")
        PY

        if [ "$INPUT_STEP_SUMMARY" = "true" ] && [ "$INPUT_FORMAT" != "markdown" ]; then
          SUMMARY_JSON="$summary_json" python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
        import json
        import os

        summary = json.loads(os.environ["SUMMARY_JSON"])
        ci_total = int(summary.get("ci_blocked") or 0) + int(summary.get("ci_pending") or 0)
        lines = [
            "## Maintainer Radar Summary",
            "",
            f"- PRs scanned: {int(summary.get('total') or 0)}",
            f"- Review now: {int(summary.get('review_now') or 0)}",
            f"- Needs author follow-up: {int(summary.get('author_follow_up') or 0)}",
            f"- CI blocked or pending: {ci_total}",
            f"- Maintainer blocked: {int(summary.get('maintainer_blocked') or 0)}",
            f"- Large or needs triage: {int(summary.get('large_or_triage') or 0)}",
            f"- Stale 7+ days: {int(summary.get('stale') or 0)}",
            f"- Average reviewability: {int(summary.get('average_score') or 0)}/100",
            "",
        ]
        print("\n".join(lines))
        PY
        fi
