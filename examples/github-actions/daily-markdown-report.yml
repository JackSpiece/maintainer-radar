name: Maintainer Radar Markdown Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1-5"

permissions:
  contents: read
  pull-requests: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Maintainer Radar
        run: python -m pip install git+https://github.com/JackSpiece/maintainer-radar.git
      - name: Build Markdown report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          maintainer-radar repo "${{ github.repository }}" \
            --limit 50 \
            --hydrate \
            --sort action \
            > maintainer-radar.md
      - uses: actions/upload-artifact@v4
        with:
          name: maintainer-radar-markdown
          path: maintainer-radar.md
