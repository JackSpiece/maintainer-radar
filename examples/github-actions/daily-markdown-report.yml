name: Maintainer Radar Markdown Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1-5"

permissions:
  contents: read
  pull-requests: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build Markdown report
        id: radar
        uses: JackSpiece/maintainer-radar@v0.16.15
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          repository: ${{ github.repository }}
          format: markdown
          output: maintainer-radar.md
          limit: "50"
          sort: action
          hydrate: "true"
          step-summary: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: maintainer-radar-markdown
          path: ${{ steps.radar.outputs.report-path }}
