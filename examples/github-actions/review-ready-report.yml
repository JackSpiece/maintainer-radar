name: Maintainer Radar Review-Ready Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1-5"

permissions:
  contents: read
  pull-requests: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build review-ready report
        id: radar
        uses: JackSpiece/maintainer-radar@v0.18.0
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          repository: ${{ github.repository }}
          format: markdown
          output: review-ready.md
          limit: "50"
          action: review-now
          min-score: "80"
          top: "10"
          group-by: action
          sort: score
          hydrate: "true"
          step-summary: "true"
      - uses: actions/upload-artifact@v7
        with:
          name: review-ready
          path: ${{ steps.radar.outputs.report-path }}
